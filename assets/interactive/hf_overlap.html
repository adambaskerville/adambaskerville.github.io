<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <title>Overlap Integral Explorer</title>
  <script src="https://cdn.plot.ly/plotly-2.35.2.min.js"></script>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    html, body {
      height: 100%; overflow: hidden;
      background: #0f0f0f; font-family: -apple-system, sans-serif; color: white;
      display: flex; flex-direction: column;
    }
    #controls {
      flex-shrink: 0;
      display: flex; align-items: flex-start; gap: 28px;
      padding: 10px 20px; background: #161616;
      border-bottom: 1px solid #2a2a2a; flex-wrap: wrap;
    }
    .ctrl-group { display: flex; flex-direction: column; gap: 4px; min-width: 160px; }
    .ctrl-group label { font-size: 11px; color: #888; text-transform: uppercase; letter-spacing: 0.06em; }
    .ctrl-group input[type=range] { accent-color: #56B4E9; width: 160px; cursor: pointer; }
    .ctrl-val { font-size: 14px; font-weight: 700; color: #d4d4ff; font-family: monospace; }
    #infobox {
      background: #0d0d1f; border: 1px solid #2a2a5a; border-radius: 7px;
      padding: 9px 15px; font-size: 12px; font-family: monospace; line-height: 1.95;
      align-self: center; min-width: 260px;
    }
    #infobox .lbl { color: #777; }
    #infobox .val { font-weight: 600; }
    #panels { flex: 1; min-height: 0; display: flex; width: 100%; }
    #left-plot { flex: 1; min-width: 0; min-height: 0; }
    #divider { width: 1px; background: #2a2a2a; flex-shrink: 0; }
    #right-plot { flex: 1; min-width: 0; min-height: 0; }
  </style>
</head>
<body>
  <div id="controls">
    <div class="ctrl-group">
      <label>α — GTO exponent (both)</label>
      <input type="range" id="sl-alpha" min="0.1" max="2.0" step="0.05" value="0.5" oninput="update()">
      <div class="ctrl-val" id="v-alpha">0.50</div>
    </div>
    <div class="ctrl-group">
      <label>R — separation (bohr)</label>
      <input type="range" id="sl-R" min="0.0" max="5.0" step="0.1" value="2.0" oninput="update()">
      <div class="ctrl-val" id="v-R">2.0</div>
    </div>
    <div id="infobox">
      <span class="lbl">S_μν = exp(−αR²/2) = </span><span class="val" id="ib-S" style="color:#009E73">—</span><br>
      <span class="lbl">At R=0: S = 1  (complete overlap)</span><br>
      <span class="lbl">At R→∞: S → 0 (no overlap)</span>
    </div>
  </div>
  <div id="panels">
    <div id="left-plot"></div>
    <div id="divider"></div>
    <div id="right-plot"></div>
  </div>

  <script>
    const NX = 400, NR = 300;
    const xs = Array.from({length: NX}, (_, i) => -5 + i * 10 / (NX - 1));
    const Rs = Array.from({length: NR}, (_, i) => i * 5 / (NR - 1));

    const darkBase = {
      paper_bgcolor: '#0f0f0f',
      plot_bgcolor: '#0f0f0f',
      font: { color: '#cccccc', family: '-apple-system, sans-serif' },
      legend: { bgcolor: 'rgba(0,0,0,0)', bordercolor: '#2a2a2a' },
      margin: { t: 70, r: 30, b: 60, l: 60 }
    };

    const axStyle = { gridcolor: '#2a2a2a', zerolinecolor: '#444', color: '#aaa' };

    function phi(alpha, center, x) {
      return Math.exp(-alpha * (x - center) ** 2);
    }

    function computeSCurve(alpha) {
      return Rs.map(r => Math.exp(-alpha * r * r / 2));
    }

    let sCurveData = computeSCurve(0.5);

    function init() {
      const alpha = 0.5, R = 2.0;
      const A = -R / 2, B = R / 2;
      const phi1 = xs.map(x => phi(alpha, A, x));
      const phi2 = xs.map(x => phi(alpha, B, x));
      const prod = xs.map(x => phi(alpha, A, x) * phi(alpha, B, x));
      const S_val = Math.exp(-alpha * R * R / 2);

      // Left panel
      const leftTraces = [
        {
          x: xs, y: phi1, name: 'φ₁ (centred at −R/2)',
          line: { color: '#56B4E9', width: 2.5 }, type: 'scatter', mode: 'lines'
        },
        {
          x: xs, y: phi2, name: 'φ₂ (centred at +R/2)',
          line: { color: '#E69F00', width: 2.5 }, type: 'scatter', mode: 'lines'
        },
        {
          x: xs, y: prod, name: 'φ₁ · φ₂ (product)',
          fill: 'tozeroy', fillcolor: 'rgba(0,158,115,0.25)',
          line: { color: '#009E73', width: 2.0 }, type: 'scatter', mode: 'lines'
        },
        {
          x: [A], y: [0], name: 'Centre A',
          marker: { symbol: 'triangle-down', size: 12, color: '#56B4E9' },
          type: 'scatter', mode: 'markers', showlegend: false
        },
        {
          x: [B], y: [0], name: 'Centre B',
          marker: { symbol: 'triangle-down', size: 12, color: '#E69F00' },
          type: 'scatter', mode: 'markers', showlegend: false
        }
      ];

      const leftLayout = Object.assign({}, darkBase, {
        title: {
          text: 'Gaussian basis functions and their product<br><sub>Shaded area = S_μν = ∫ φ₁(r)φ₂(r) d³r</sub>',
          font: { size: 13, color: '#ddd' }
        },
        xaxis: Object.assign({}, axStyle, { title: { text: 'x (bohr)', font: { color: '#aaa' } }, range: [-5, 5] }),
        yaxis: Object.assign({}, axStyle, { title: { text: 'φ(x)', font: { color: '#aaa' } }, range: [-0.05, 1.15] })
      });

      Plotly.newPlot('left-plot', leftTraces, leftLayout, { autosize: true, responsive: true });

      // Right panel
      const rightTraces = [
        {
          x: Rs, y: sCurveData, name: 'S_μν(R)',
          line: { color: '#009E73', width: 2.5 }, type: 'scatter', mode: 'lines'
        },
        {
          x: [R, R], y: [-0.05, 1.1], name: 'Current R',
          line: { color: 'white', width: 1.5, dash: 'dot' },
          type: 'scatter', mode: 'lines', showlegend: false
        },
        {
          x: [R], y: [S_val], name: 'S at current R',
          marker: { color: '#009E73', size: 10 },
          type: 'scatter', mode: 'markers', showlegend: false
        }
      ];

      const rightLayout = Object.assign({}, darkBase, {
        title: { text: 'S_μν vs separation R', font: { size: 13, color: '#ddd' } },
        xaxis: Object.assign({}, axStyle, { title: { text: 'R (bohr)', font: { color: '#aaa' } }, range: [0, 5] }),
        yaxis: Object.assign({}, axStyle, { title: { text: 'S_μν', font: { color: '#aaa' } }, range: [-0.05, 1.1] }),
        annotations: [
          {
            x: 0.1, y: 0.97, xref: 'x', yref: 'y',
            text: 'S(0) = 1', showarrow: false,
            font: { color: '#aaa', size: 11 }
          },
          {
            x: 4.0, y: 0.08, xref: 'x', yref: 'y',
            text: 'S → 0 as R → ∞', showarrow: false,
            font: { color: '#aaa', size: 11 }
          }
        ]
      });

      Plotly.newPlot('right-plot', rightTraces, rightLayout, { autosize: true, responsive: true });

      document.getElementById('ib-S').textContent = S_val.toFixed(6);
    }

    function update() {
      const alpha = parseFloat(document.getElementById('sl-alpha').value);
      const R     = parseFloat(document.getElementById('sl-R').value);
      document.getElementById('v-alpha').textContent = alpha.toFixed(2);
      document.getElementById('v-R').textContent     = R.toFixed(1);

      const A = -R / 2, B = R / 2;
      const phi1 = xs.map(x => phi(alpha, A, x));
      const phi2 = xs.map(x => phi(alpha, B, x));
      const prod = xs.map(x => phi(alpha, A, x) * phi(alpha, B, x));
      const S_val = Math.exp(-alpha * R * R / 2);

      document.getElementById('ib-S').textContent = S_val.toFixed(6);

      // Update left panel
      Plotly.update('left-plot',
        { y: [phi1, phi2, prod, [0], [0]], x: [xs, xs, xs, [A], [B]] },
        {}
      );

      // Recompute S curve if alpha changed
      sCurveData = computeSCurve(alpha);

      // Update right panel: curve + vertical line + dot
      Plotly.update('right-plot',
        {
          y: [sCurveData, [-0.05, 1.1], [S_val]],
          x: [Rs, [R, R], [R]]
        },
        {}
      );
    }

    init();
  </script>
</body>
</html>
