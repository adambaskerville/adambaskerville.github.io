<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <title>Boys Function Explorer</title>
  <script src="https://cdn.plot.ly/plotly-2.35.2.min.js"></script>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    html, body {
      height: 100%; overflow: hidden;
      background: #0f0f0f; font-family: -apple-system, sans-serif; color: white;
      display: flex; flex-direction: column;
    }
    #controls {
      flex-shrink: 0;
      display: flex; align-items: flex-start; gap: 24px;
      padding: 10px 20px; background: #161616;
      border-bottom: 1px solid #2a2a2a; flex-wrap: wrap;
    }
    .ctrl-group { display: flex; flex-direction: column; gap: 4px; }
    .ctrl-group label { font-size: 11px; color: #888; text-transform: uppercase; letter-spacing: 0.06em; }
    .ctrl-group input[type=range] { accent-color: #56B4E9; width: 180px; cursor: pointer; }
    .ctrl-val { font-size: 14px; font-weight: 700; color: #d4d4ff; font-family: monospace; }
    #order-btns { display: flex; gap: 7px; align-items: center; flex-wrap: wrap; margin-top: 3px; }
    #order-btns span { font-size: 12px; color: #777; }
    .ord-btn {
      border-radius: 5px; padding: 4px 12px; font-size: 12px; cursor: pointer;
      border: 1.5px solid; background: #1a1a1a; font-weight: 600; transition: opacity 0.15s;
    }
    .ord-btn.dim { opacity: 0.35; }
    #panels {
      flex: 1; min-height: 0;
      display: flex; width: 100%;
    }
    #left-plot, #right-plot { flex: 1; min-width: 0; min-height: 0; }
    #divider { width: 1px; background: #2a2a2a; flex-shrink: 0; }
  </style>
</head>
<body>
  <div id="controls">
    <div class="ctrl-group">
      <label>t — damping parameter</label>
      <input type="range" id="sl-t" min="0" max="20" step="0.1" value="2.0" oninput="onT()">
      <div class="ctrl-val" id="v-t">2.0</div>
    </div>
    <div class="ctrl-group">
      <label>Highlight order in left panel</label>
      <div id="order-btns">
        <span>n =</span>
        <button class="ord-btn" id="ob0" onclick="selectN(0)" style="color:#0072B2;border-color:#0072B2;">0</button>
        <button class="ord-btn" id="ob1" onclick="selectN(1)" style="color:#E69F00;border-color:#E69F00;">1</button>
        <button class="ord-btn" id="ob2" onclick="selectN(2)" style="color:#009E73;border-color:#009E73;">2</button>
        <button class="ord-btn" id="ob3" onclick="selectN(3)" style="color:#CC79A7;border-color:#CC79A7;">3</button>
        <button class="ord-btn" id="ob4" onclick="selectN(4)" style="color:#D55E00;border-color:#D55E00;">4</button>
      </div>
    </div>
  </div>

  <div id="panels">
    <div id="left-plot"></div>
    <div id="divider"></div>
    <div id="right-plot"></div>
  </div>

  <script>
    // Wong (2011) colourblind-safe palette
    const COLORS = ['#0072B2','#E69F00','#009E73','#CC79A7','#D55E00'];
    const NMAX = 4;
    const NT   = 400, TMAX = 20;
    const NU   = 200;

    const ts = Array.from({length: NT}, (_, i) => i * TMAX / (NT-1));
    const us = Array.from({length: NU}, (_, i) => i / (NU-1));

    let selN = 0;

    // ── Math ────────────────────────────────────────────────────────────────

    function erf(x) {
      if (x < 0) return -erf(-x);
      const t = 1/(1 + 0.3275911*x);
      return 1 - t*(0.254829592+t*(-0.284496736+t*(1.421413741+t*(-1.453152027+t*1.061405429))))*Math.exp(-x*x);
    }

    function boys(n, t) {
      if (t < 1e-9) return 1/(2*n+1);
      let fn = 0.5*Math.sqrt(Math.PI/t)*erf(Math.sqrt(t));
      for (let k = 0; k < n; k++) fn = ((2*k+1)*fn - Math.exp(-t))/(2*t);
      return fn;
    }

    const boysData = Array.from({length: NMAX+1}, (_, n) => ts.map(t => boys(n, t)));

    // ── Left panel: integrand ────────────────────────────────────────────────

    function integrand(n, t) {
      return us.map(u => Math.pow(u, 2*n) * Math.exp(-t*u*u));
    }

    function initLeft() {
      const n = selN, t = currentT();
      const y = integrand(n, t);
      const Fn = boys(n, t);
      const col = COLORS[n];

      const traces = [
        {
          x: us, y: y, name: `F<sub>${n}</sub>(t)`,
          fill: 'tozeroy', fillcolor: hexAlpha(col, 0.22),
          line: {color: col, width: 2.5}, type: 'scatter', mode: 'lines',
        },
      ];

      const layout = {
        autosize: true,
        paper_bgcolor: '#0f0f0f', plot_bgcolor: '#111111',
        font: {color: 'white', size: 12},
        title: {
          text: `<b>Boys integrand</b>  f(u) = u<sup>2n</sup>·e<sup>−tu²</sup>  on [0, 1]<br><sup>Shaded area = F<sub>n</sub>(t) = ∫₀¹ u<sup>2n</sup> e<sup>−tu²</sup> du</sup>`,
          x: 0.5, xanchor: 'center', font: {size: 12}
        },
        xaxis: {
          title: 'u', range: [0, 1.01],
          gridcolor: '#1e1e1e', zeroline: true, zerolinecolor: '#2e2e2e'
        },
        yaxis: {
          title: 'f(u)', range: [-0.02, 1.12],
          gridcolor: '#1e1e1e', zeroline: false
        },
        margin: {t: 75, b: 55, l: 60, r: 15},
        showlegend: false,
        annotations: [
          {
            text: annotText(n, t, Fn),
            x: 0.97, y: 0.97, xref: 'paper', yref: 'paper',
            showarrow: false, xanchor: 'right', yanchor: 'top',
            bgcolor: '#0d0d1f', bordercolor: COLORS[n], borderwidth: 1, borderpad: 6,
            font: {size: 12, family: 'monospace', color: COLORS[n]}
          },
          {
            text: `t = 0 → area = 1/(2n+1) = ${(1/(2*n+1)).toFixed(4)}`,
            x: 0.03, y: 0.06, xref: 'paper', yref: 'paper',
            showarrow: false, font: {color: '#555', size: 10, family: 'monospace'}
          }
        ]
      };

      Plotly.newPlot('left-plot', traces, layout, {responsive: true, displayModeBar: false});
    }

    function updateLeft() {
      const n = selN, t = currentT();
      const y = integrand(n, t);
      const Fn = boys(n, t);
      const col = COLORS[n];
      Plotly.restyle('left-plot', {
        y: [y], fillcolor: hexAlpha(col, 0.22),
        line: {color: col, width: 2.5}
      }, [0]);
      Plotly.relayout('left-plot', {
        'annotations[0].text': annotText(n, t, Fn),
        'annotations[0].bordercolor': col,
        'annotations[0].font.color': col,
        'annotations[1].text': `t = 0 → area = 1/(2n+1) = ${(1/(2*n+1)).toFixed(4)}`,
      });
    }

    function annotText(n, t, val) {
      return `n = ${n},  t = ${t.toFixed(2)}<br>F<sub>${n}</sub>(t) = <b>${val.toFixed(5)}</b>`;
    }

    // ── Right panel: F_n(t) family ───────────────────────────────────────────

    function initRight() {
      const t = currentT();
      const traces = [];

      for (let n = 0; n <= NMAX; n++) {
        const w = (n === selN) ? 3 : 1.5;
        const op = (n === selN) ? 1.0 : 0.4;
        traces.push({
          x: ts, y: boysData[n],
          name: `F<sub>${n}</sub>(t)`,
          line: {color: COLORS[n], width: w},
          opacity: op, type: 'scatter', mode: 'lines',
        });
      }

      traces.push({
        x: [t, t], y: [0, 1.05], name: 'Current t',
        line: {color: '#ffffff', width: 1.5, dash: 'dot'},
        type: 'scatter', mode: 'lines', showlegend: false,
      });

      for (let n = 0; n <= NMAX; n++) {
        traces.push({
          x: [t], y: [boys(n, t)], mode: 'markers',
          marker: {color: COLORS[n], size: (n===selN)?10:6, line:{color:'white',width:1}},
          showlegend: false, type: 'scatter',
        });
      }

      const layout = {
        autosize: true,
        paper_bgcolor: '#0f0f0f', plot_bgcolor: '#111111',
        font: {color: 'white', size: 12},
        title: {
          text: '<b>F<sub>n</sub>(t)</b>  for n = 0 … 4<br><sup>Drag the slider — the vertical line moves and dots show current values</sup>',
          x: 0.5, xanchor: 'center', font: {size: 12}
        },
        xaxis: {
          title: 't', range: [0, TMAX],
          gridcolor: '#1e1e1e', zeroline: true, zerolinecolor: '#2e2e2e'
        },
        yaxis: {
          title: 'F<sub>n</sub>(t)', range: [-0.02, 1.1],
          gridcolor: '#1e1e1e', zeroline: false
        },
        legend: {
          bgcolor: 'rgba(0,0,0,0)', bordercolor: '#333', borderwidth: 1,
          x: 0.97, y: 0.97, xanchor: 'right', yanchor: 'top'
        },
        margin: {t: 75, b: 55, l: 55, r: 15},
        annotations: [
          {text:'F<sub>n</sub>(0)=1/(2n+1)', x:0.01, y:0.96, xref:'paper', yref:'paper', showarrow:false, font:{color:'#555',size:10}},
          {text:'F<sub>n</sub>(t)→0 as t→∞', x:0.85, y:0.08, xref:'paper', yref:'paper', showarrow:false, font:{color:'#555',size:10}},
        ]
      };

      Plotly.newPlot('right-plot', traces, layout, {responsive: true, displayModeBar: false});
    }

    function updateRight() {
      const t = currentT();
      for (let n = 0; n <= NMAX; n++) {
        Plotly.restyle('right-plot', {
          'line.width': [(n===selN)?3:1.5],
          opacity: [(n===selN)?1.0:0.4]
        }, [n]);
      }
      Plotly.restyle('right-plot', {x:[[t,t]]}, [NMAX+1]);
      for (let n = 0; n <= NMAX; n++) {
        Plotly.restyle('right-plot', {
          x:[[t]], y:[[boys(n,t)]],
          'marker.size':[(n===selN)?10:6]
        }, [NMAX+2+n]);
      }
    }

    // ── Interactions ─────────────────────────────────────────────────────────

    function currentT() { return parseFloat(document.getElementById('sl-t').value); }

    function onT() {
      document.getElementById('v-t').textContent = currentT().toFixed(1);
      updateLeft();
      updateRight();
    }

    function selectN(n) {
      selN = n;
      for (let i = 0; i <= NMAX; i++) {
        document.getElementById(`ob${i}`).classList.toggle('dim', i !== n);
      }
      updateLeft();
      updateRight();
    }

    function hexAlpha(hex, a) {
      const r = parseInt(hex.slice(1,3),16);
      const g = parseInt(hex.slice(3,5),16);
      const b = parseInt(hex.slice(5,7),16);
      return `rgba(${r},${g},${b},${a})`;
    }

    // ── Init ─────────────────────────────────────────────────────────────────
    function init() {
      document.getElementById('ob0').classList.remove('dim');
      for (let i = 1; i <= NMAX; i++) document.getElementById(`ob${i}`).classList.add('dim');
      initLeft();
      initRight();
    }

    init();
  </script>
</body>
</html>
